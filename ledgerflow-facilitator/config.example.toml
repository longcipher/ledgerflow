# LedgerFlow Facilitator (x402 v2) example configuration
#
# Core design:
# - chain-agnostic network ids (CAIP-like `namespace:reference`)
# - adapter registry (each adapter handles specific scheme + version + network pattern)
# - offchain/CEX adapters for centralized payment systems
# - EVM on-chain adapters for EIP-3009 transferWithAuthorization

host = "0.0.0.0"
port = 3402

# Global rate limit (requests per second). Comment out or set to 0 to disable.
# rate_limit_per_second = 100

# ── Offchain / CEX adapter (mock for development) ────────────────────

[[adapters]]
kind = "offchain"
id = "cex-mock"
enabled = true
x402_version = 2
scheme = "exact"
networks = ["offchain:*"]
signers = ["offchain-facilitator"]

[adapters.backend]
type = "mock"
payer = "cex:user:alice"
transaction_prefix = "cex-tx"

